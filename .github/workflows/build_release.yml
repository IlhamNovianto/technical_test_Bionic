name: Build & Release APK

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        name: Build Release APK
        runs-on: ubuntu-latest

        steps:
            - name: Checkout kode
              uses: actions/checkout@v4

            - name: Setup Java 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.24.0"
                  channel: "stable"
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            # ── Restore file sensitif ────────────────────────────────
            - name: Restore google-services.json
              run: |
                  echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
                    > android/app/google-services.json

            - name: Restore firebase_options.dart
              run: |
                  echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode \
                    > lib/firebase_options.dart

            # ✅ Buat env.json dari secrets
            - name: Buat env.json
              run: |
                  cat > env.json << EOF
                  {
                    "NEWS_API_KEY": "${{ secrets.NEWS_API_KEY }}",
                    "BASE_URL": "https://newsapi.org/v2"
                  }
                  EOF

            # ── Restore Keystore ─────────────────────────────────────
            - name: Restore Keystore
              run: |
                  echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
                    > android/app/upload-keystore.jks

            - name: Buat key.properties
              run: |
                  cat > android/key.properties << EOF
                  storePassword=${{ secrets.KEYSTORE_PASSWORD }}
                  keyPassword=${{ secrets.KEY_PASSWORD }}
                  keyAlias=${{ secrets.KEY_ALIAS }}
                  storeFile=upload-keystore.jks
                  EOF

            # ── Build ─────────────────────────────────────────────────
            - name: Analyze kode
              run: flutter analyze --no-fatal-infos

            - name: Run unit tests
              run: flutter test test/

            # ✅ Inject env.json saat build menggunakan --dart-define-from-file
            - name: Build release APK
              run: |
                  flutter build apk --release \
                    --dart-define-from-file=env.json

            - name: Rename APK
              run: |
                  VERSION=$(grep 'version:' pubspec.yaml | \
                    sed 's/version: //' | tr -d ' ')
                  mv build/app/outputs/flutter-apk/app-release.apk \
                     build/app/outputs/flutter-apk/news_app_v${VERSION}.apk
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-apk
                  path: build/app/outputs/flutter-apk/*.apk
                  retention-days: 30

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              with:
                  tag_name: v${{ env.VERSION }}-${{ github.run_number }}
                  name: "Release v${{ env.VERSION }}"
                  body: |
                      ## Release Otomatis 🚀

                      **Versi:** ${{ env.VERSION }}
                      **Commit:** ${{ github.sha }}

                      ### Perubahan
                      ${{ github.event.head_commit.message }}

                      ### Download APK
                      Download APK di bagian **Assets** di bawah.
                  files: build/app/outputs/flutter-apk/*.apk
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
